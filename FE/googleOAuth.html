<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google OAuth Test</title>
  <script src="https://accounts.google.com/gsi/client?hl=en" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 8px; color: #111; }
    p.sub { font-size: 14px; color: #666; margin-bottom: 28px; }
    .g-signin-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    #user-info { display: none; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 12px; }
    .name { font-size: 18px; font-weight: 600; color: #111; }
    .email { font-size: 14px; color: #555; margin-top: 4px; margin-bottom: 20px; }
    .token-box {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      text-align: left;
      font-size: 11px;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 160px;
      overflow-y: auto;
      color: #333;
      margin-bottom: 16px;
    }
    .label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .status { font-size: 13px; padding: 8px 14px; border-radius: 6px; margin-bottom: 12px; }
    .status.success { background: #e6f4ea; color: #1e7e34; }
    .status.error { background: #fdecea; color: #c0392b; }
    .logout-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
    }
    .logout-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div class="card">
  <h1>Google OAuth Test</h1>
  <p class="sub">Sign in to test the OAuth flow</p>

  <div class="g-signin-wrapper">
    <!-- REPLACE YOUR_CLIENT_ID_HERE with your actual Client ID -->
    <div id="g_id_onload"
         data-client_id="your client id here"
         data-callback="handleCredentialResponse"
         data-locale="en">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="sign_in_with"
         data-size="large"
         data-locale="en"
         data-width="300">
    </div>
  </div>

  <div id="user-info">
    <img id="avatar" class="avatar" src="" alt="avatar"/>
    <div class="name" id="name"></div>
    <div class="email" id="email"></div>
    <div id="backend-status"></div>
    <div class="label">ID Token (JWT)</div>
    <div class="token-box" id="token-box"></div>
    <div class="label">Decoded Payload</div>
    <div class="token-box" id="payload-box"></div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<script>
  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(
      atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
    ));
  }

  async function handleCredentialResponse(response) {
    const idToken = response.credential;
    const payload = parseJwt(idToken);

    // Show user info
    document.getElementById('user-info').style.display = 'block';
    document.querySelector('.g-signin-wrapper').style.display = 'none';
    document.getElementById('avatar').src = payload.picture;
    document.getElementById('name').textContent = payload.name;
    document.getElementById('email').textContent = payload.email;
    document.getElementById('token-box').textContent = idToken;
    document.getElementById('payload-box').textContent = JSON.stringify(payload, null, 2);

    // Send to backend
    try {
      const backendResponse = await fetch('http://localhost:3001/users/social-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });
      const result = await backendResponse.json();
      const statusEl = document.getElementById('backend-status');
      if (backendResponse.ok) {
        statusEl.innerHTML = `<div class="status success">
          ✓ Backend login successful
          <div class="label" style="margin-top:10px">Access Token</div>
          <div class="token-box">${result.data?.accessToken}</div>
          <div class="label">Refresh Token</div>
          <div class="token-box">${result.data?.refreshToken}</div>
        </div>`;
      } else {
        statusEl.innerHTML = `<div class="status error">✗ ${result.message || 'Backend error'}</div>`;
      }
    } catch (err) {
      document.getElementById('backend-status').innerHTML =
        `<div class="status error">✗ Backend unreachable: ${err.message}</div>`;
    }
  }

  function logout() {
    document.getElementById('user-info').style.display = 'none';
    document.querySelector('.g-signin-wrapper').style.display = 'flex';
    google.accounts.id.disableAutoSelect();
  }
</script>
</body>
</html>
