<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
  }
  h1 { font-size: 22px; margin-bottom: 8px; color: #111; text-align: center; }
  p.sub { font-size: 14px; color: #666; margin-bottom: 28px; text-align: center; }
  label { font-size: 13px; color: #333; display: block; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 18px;
    outline: none;
  }
  input:focus { border-color: #0ea5e9; }
  .toggle-eye {
    position: relative;
  }
  .toggle-eye span {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
    font-size: 13px;
    color: #888;
    user-select: none;
  }
  button {
    width: 100%;
    padding: 13px;
    background: #0ea5e9;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { background: #9cd4ec; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #0c8fcb; }
  .status {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    display: none;
  }
  .status.success { background: #e6f4ea; color: #1e7e34; display: block; }
  .status.error { background: #fdecea; color: #c0392b; display: block; }
  .field-error { font-size: 12px; color: #c0392b; margin-top: -14px; margin-bottom: 14px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Reset Password</h1>
  <p class="sub">Enter your new password below</p>

  <form id="reset-form">
    <label for="password">New Password</label>
    <div class="toggle-eye">
      <input type="password" id="password" placeholder="Enter new password"/>
      <span onclick="toggleVisibility('password', this)">Show</span>
    </div>

    <label for="confirmPassword">Confirm Password</label>
    <div class="toggle-eye">
      <input type="password" id="confirmPassword" placeholder="Confirm new password"/>
      <span onclick="toggleVisibility('confirmPassword', this)">Show</span>
    </div>
    <div class="field-error" id="match-error">Passwords do not match</div>

    <button type="submit" id="submit-btn">Reset Password</button>
  </form>

  <div class="status" id="status"></div>
</div>

<script>
  // Read token from URL: e.g. reset-password.html?token=abc123
  const pathParts = window.location.pathname.split('/').filter(part => part !== "");
  const resetToken = pathParts[pathParts.length - 1];

  function toggleVisibility(id, el) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      el.textContent = 'Hide';
    } else {
      input.type = 'password';
      el.textContent = 'Show';
    }
  }

  const form = document.getElementById('reset-form');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submit-btn');
  const matchError = document.getElementById('match-error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    statusEl.style.display = 'none';
    matchError.style.display = 'none';

    if (password !== confirmPassword) {
      matchError.style.display = 'block';
      return;
    }

    if (!resetToken) {
      statusEl.style.display = 'block';
      statusEl.style.background = '#fdecea';
      statusEl.style.color = '#c0392b';
      statusEl.textContent = '✗ Missing or invalid reset token in URL';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';

    try {
      const response = await fetch(`http://localhost:3001/api/v1/auth/reset-password/${resetToken}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          password,
          confirmPassword,
    })
      });

      const result = await response.json();
      console.log('Reset password response:', result);

      if (response.ok) {
        statusEl.style.display = 'block';
        statusEl.style.background = '#e6f4ea';
        statusEl.style.color = '#1e7e34';
        statusEl.textContent = '✓ ' + (result.message || 'Password reset successfully');
        
        form.reset();
      } else {
        statusEl.style.display = 'block';
        statusEl.style.background = '#fdecea';
        statusEl.style.color = '#c0392b';
        statusEl.textContent = '✗ ' + (result.message || 'Failed to reset password');
      }
    } catch (err) {
      statusEl.style.display = 'block';
      statusEl.style.background = '#fdecea';
      statusEl.style.color = '#c0392b';
      statusEl.textContent = '✗ ' + (result.message || 'Failed to reset password');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  });
</script>
</body>
</html>
